<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venise AR Show</title>

    <style>
        body {
            margin: 0;
            background-color: #1e1e1e;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            margin-top: 40px;
        }

        h1 {
            font-size: 3rem;
            color: #fff;
            margin: 0;
        }

        #unity-container {
            position: relative;
            width: 90vw;
            height: 80vh;
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: black;
        }

        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(255, 255, 255, 0.2);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #start-btn {
            width: 350px;
            height: 80px;
            background: rgba(255, 111, 97, 0.7);
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 111, 97, 0.7);
            border: none;
            outline: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            color: white;
            font-weight: bold;
        }

        #loading-bar {
            width: 300px;
            height: 50px;
            background: rgba(255, 111, 97, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: black;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="title">
        <h1>Venise AR Show</h1>
    </div>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="start-overlay">
            <button id="start-btn">
                Enter the gallery
            </button>
            <div id="loading-bar" style="display:none;">
                Chargement...
            </div>
        </div>
    </div>

    <script src="Build/Builds.loader.js"></script>

    <script>
        const startBtn = document.getElementById("start-btn");
        const loadingBar = document.getElementById("loading-bar");
        const canvas = document.getElementById("unity-canvas");

        const config = {
            dataUrl: "Build/Builds.data",
            frameworkUrl: "Build/Builds.framework.js",
            codeUrl: "Build/Builds.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "kirrril",
            productName: "VeniseARShow",
            productVersion: "1.0"
        }

        startBtn.addEventListener("click", () => {

            startBtn.style.display = "none";
            loadingBar.style.display = "flex";

            createUnityInstance(canvas, config, (progress) => {
                loadingBar.innerHTML = "Chargement : " + Math.round(progress * 100) + "%";
            }).then((unityInstance) => {
                document.getElementById("start-overlay").style.display = "none";
            });
        });
    </script>
</body>

</html>
